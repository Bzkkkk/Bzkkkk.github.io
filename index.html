<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        h1 {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #aaa;
            font-size: 1.1em;
            margin-bottom: 32px;
        }

        .bio {
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 36px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .links a {
            display: block;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 1em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .links a:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">👋</div>
        <h1>你的名字</h1>
        <p class="subtitle">开发者 / 设计师 / 写作者</p>
        <p class="bio">
            你好！欢迎来到我的个人主页。<br>
            我热爱技术，喜欢探索新事物，这里是我在互联网上的小天地。
        </p>
        <div class="links">
            <a href="https://github.com/你的用户名" target="_blank">🐙 GitHub</a>
            <a href="mailto:你的邮箱@example.com">📧 联系我</a>
            <a href="#">📝 我的博客</a>
            <a href="#">📄 个人简历</a>
        </div>
    </div>
</body>
</html>
